
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Budget Buddy</title>

    <!-- PWA Manifest & Theme -->
    ./manifest.webmanifest
    <meta name="theme-color" content="#22c55e" />

    <!-- Styles -->
    ./styles.css

    <!-- React & friends (CDN) -->
    <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.jsssoriginom@18/umd/react-dom.production.min.js</script>
    <script defer crossorigin src="https://unpkg.com/dayjstps://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js</script>

    <!-- Babel Standalone (no defer: ensures it compiles text/babel scripts) -->
    https://unpkg.com/@babel/standalone/babel.min.js</script>
  </head>
  <body>
    <div id="root"></div>

    <!-- App (inline JSX via Babel) -->
    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useMemo, useReducer, useRef, createContext, useContext } = React;

      // ===== Utils =====
      const formatCurrency = (n) =>
        (n ?? 0).toLocaleString('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 });

      const sumIncome = (transactions) =>
        transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + Number(t.amount || 0), 0);

      const sumExpenses = (transactions) =>
        transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + Number(t.amount || 0), 0);

      // Simple ID generator (avoid uuid UMD differences)
      const makeId = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

      // ===== Global State (Context) =====
      const BudgetContext = createContext(null);

      const initialState = {
        transactions: [],
        categories: ['Housing','Transportation','Food','Utilities','Insurance','Healthcare','Debt','Savings','Entertainment','Income'],
      };

      function reducer(state, action) {
        switch (action.type) {
          case 'INIT': return action.payload;
          case 'ADD_TX': return { ...state, transactions: [action.payload, ...state.transactions] };
          case 'UPDATE_TX':
            return { ...state, transactions: state.transactions.map(t => t.id === action.payload.id ? action.payload : t) };
          case 'DELETE_TX': return { ...state, transactions: state.transactions.filter(t => t.id !== action.payload) };
          case 'ADD_CATEGORY':
            if (state.categories.includes(action.payload)) return state;
            return { ...state, categories: [...state.categories, action.payload] };
          case 'DELETE_CATEGORY': return { ...state, categories: state.categories.filter(c => c !== action.payload) };
          case 'IMPORT': return action.payload;
          case 'CLEAR': return initialState;
          default: return state;
        }
      }

      function BudgetProvider({ children }) {
        const [state, dispatch] = useReducer(reducer, initialState);

        useEffect(() => {
          const raw = localStorage.getItem('budget-app');
          if (raw) {
            try { dispatch({ type: 'INIT', payload: JSON.parse(raw) }); }
            catch (e) { console.error('Failed to parse saved budget data', e); }
          }
        }, []);

        useEffect(() => {
          localStorage.setItem('budget-app', JSON.stringify(state));
        }, [state]);

        const addTransaction = (tx) => {
          const payload = { ...tx, id: makeId() };
          dispatch({ type: 'ADD_TX', payload });
        };

        const value = { state, dispatch, addTransaction };
        return <BudgetContext.Provider value={value}>{children}</BudgetContext.Provider>;
      }

      const useBudget = () => {
        const ctx = useContext(BudgetContext);
        if (!ctx) throw new Error('useBudget must be used within BudgetProvider');
        return ctx;
      };

      function InstallPWA() {
        const [deferredPrompt, setDeferredPrompt] = useState(null);
        const [visible, setVisible] = useState(false);

        useEffect(() => {
          const handler = (e) => {
            e.preventDefault();
            setDeferredPrompt(e);
            setVisible(true);
          };
          window.addEventListener('beforeinstallprompt', handler);
          window.addEventListener('appinstalled', () => {
            setVisible(false);
            setDeferredPrompt(null);
            console.log('App installed!');
          });
          return () => window.removeEventListener('beforeinstallprompt', handler);
        }, []);

        const install = async () => {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          setVisible(false);
          setDeferredPrompt(null);
        };

        if (!visible) return null;
        return <button className="btn-outline" onClick={install} title="Install Budget Buddy">Install App</button>;
      }

      function Header() {
        return (
          <div className="card row" style={{ justifyContent: 'space-between' }}>
            <h1>Budget Buddy</h1>
            <div className="row">
              <div className="small" style={{ marginRight: 8 }}>Simple React budget tracker (PWA)</div>
              <InstallPWA />
            </div>
          </div>
        );
      }

      function Summary({ filtered }) {
        const income = sumIncome(filtered);
        const expenses = sumExpenses(filtered);
        const net = income - expenses;
        return (
          <div className="card grid grid-2">
            <div>
              <h3>Total Income</h3>
              <div style={{ fontSize: 24, color: '#22c55e' }}>{formatCurrency(income)}</div>
            </div>
            <div>
              <h3>Total Expenses</h3>
              <div style={{ fontSize: 24, color: '#ef4444' }}>{formatCurrency(expenses)}</div>
            </div>
            <div>
              <h3>Net</h3>
              <div style={{ fontSize: 24 }}>{formatCurrency(net)}</div>
              <div className="small">{net >= 0 ? 'You are in the green ✅' : 'You are overspending ⚠️'}</div>
            </div>
          </div>
        );
      }

      function TransactionForm() {
        const { state, addTransaction } = useBudget();
        const empty = {
          type: 'expense',
          amount: '',
          category: 'Food',
          date: dayjs().format('YYYY-MM-DD'),
          notes: '',
        };
        const [form, setForm] = useState(empty);
        const onSubmit = (e) => {
          e.preventDefault();
          const amount = Number(form.amount);
          if (!amount || amount <= 0) return alert('Please enter a valid amount');
          addTransaction({ ...form, amount });
          setForm({ ...empty, date: dayjs().format('YYYY-MM-DD') });
        };
        return (
          <div className="card">
            <h3>Add Transaction</h3>
            <form onSubmit={onSubmit} className="grid" style={{ gap: 12 }}>
              <div className="row">
                <select value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))} aria-label="Type">
                  <option value="income">Income</option>
                  <option value="expense">Expense</option>
                </select>
                <input type="number" step="0.01" placeholder="Amount" value={form.amount}
                  onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} aria-label="Amount" />
                <select value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))} aria-label="Category">
                  {state.categories.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
                <input type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} aria-label="Date" />
              </div>
              <textarea placeholder="Notes (optional)" value={form.notes}
                onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} rows={2} />
              <div className="row">
                <button className="btn" type="submit">Add</button>
                <button className="btn-outline" type="button" onClick={() => setForm(empty)}>Reset</button>
              </div>
            </form>
          </div>
        );
      }

      function TransactionList({ filtered }) {
        const { dispatch } = useBudget();
        const [editingId, setEditingId] = useState(null);
        const [draft, setDraft] = useState(null);

        const startEdit = (tx) => { setEditingId(tx.id); setDraft({ ...tx }); };
        const cancelEdit = () => { setEditingId(null); setDraft(null); };
        const saveEdit = () => {
          const amount = Number(draft.amount);
          if (!amount || amount <= 0) return alert('Enter a valid amount');
          dispatch({ type: 'UPDATE_TX', payload: { ...draft, amount } });
          cancelEdit();
        };
        const remove = (id) => { if (confirm('Delete this transaction?')) dispatch({ type: 'DELETE_TX', payload: id }); };

        return (
          <div className="card">
            <h3>Transactions</h3>
            <table className="table">
              <thead>
                <tr><th>Type</th><th>Amount</th><th>Category</th><th>Date</th><th>Notes</th><th /></tr>
              </thead>
              <tbody>
                {filtered.length === 0 && <tr><td colSpan="6" className="small">No transactions yet.</td></tr>}
                {filtered.map(tx => (
                  <tr key={tx.id}>
                    <td><span className={`badge ${tx.type}`}>{tx.type}</span></td>
                    <td>
                      {editingId === tx.id ? (
                        <input type="number" step="0.01" value={draft.amount}
                          onChange={e => setDraft(d => ({ ...d, amount: e.target.value }))} />
                      ) : (formatCurrency(tx.amount))}
                    </td>
                    <td>
                      {editingId === tx.id ? (
                        <input value={draft.category} onChange={e => setDraft(d => ({ ...d, category: e.target.value }))} />
                      ) : (tx.category)}
                    </td>
                    <td>
                      {editingId === tx.id ? (
                        <input type="date" value={draft.date}
                          onChange={e => setDraft(d => ({ ...d, date: e.target.value }))} />
                      ) : (dayjs(tx.date).format('MMM D, YYYY'))}
                    </td>
                    <td>
                      {editingId === tx.id ? (
                        <input value={draft.notes} onChange={e => setDraft(d => ({ ...d, notes: e.target.value }))} />
                      ) : (tx.notes || '-')}
                    </td>
                    <td className="row">
                      {editingId === tx.id ? (
                        <>
                          <button className="btn" onClick={saveEdit}>Save</button>
                          <button className="btn-outline" onClick={cancelEdit}>Cancel</button>
                        </>
                      ) : (
                        <>
                          <button className="btn-outline" onClick={() => startEdit(tx)}>Edit</button>
                          <button className="btn-danger" onClick={() => remove(tx.id)}>Delete</button>
                        </>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }

      function Filters({ month, setMonth, category, setCategory }) {
        const { state } = useBudget();
        const months = (() => {
          const set = new Set(state.transactions.map(t => dayjs(t.date).format('YYYY-MM')));
          return Array.from(set).sort();
        })();
        return (
          <div className="card row" style={{ justifyContent: 'space-between' }}>
            <div className="row" style={{ gap: 8 }}>
              <select value={month} onChange={e => setMonth(e.target.value)} aria-label="Month">
                <option value="">All Months</option>
                {months.map(m => <option key={m} value={m}>{dayjs(m).format('MMMM YYYY')}</option>)}
              </select>
              <select value={category} onChange={e => setCategory(e.target.value)} aria-label="Category">
                <option value="">All Categories</option>
                {state.categories.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="small">Filter by month & category</div>
          </div>
        );
      }

      function CategoryManager() {
        const { state, dispatch } = useBudget();
        const [name, setName] = useState('');
        const add = () => {
          const n = name.trim();
          if (!n) return;
          dispatch({ type: 'ADD_CATEGORY', payload: n });
          setName('');
        };
        const remove = (c) => { if (confirm(`Delete category "${c}"?`)) dispatch({ type: 'DELETE_CATEGORY', payload: c }); };
        return (
          <div className="card">
            <h3>Categories</h3>
            <div className="row" style={{ marginBottom: 12 }}>
              <input placeholder="New category" value={name} onChange={e => setName(e.target.value)} />
              <button className="btn" onClick={add}>Add</button>
            </div>
            <div className="row" style={{ flexWrap: 'wrap', gap: 8 }}>
              {state.categories.map(c => (
                <span key={c} className="badge" style={{ background: '#1f2937', color: '#cbd5e1' }}>
                  {c} <button className="btn-outline" style={{ marginLeft: 6 }} onClick={() => remove(c)}>x</button>
                </span>
              ))}
            </div>
          </div>
        );
      }

      function Charts({ filtered }) {
        const lineRef = useRef(null);
        const doughnutRef = useRef(null);
        const lineChart = useRef(null);
        const doughnutChart = useRef(null);

        const monthlyData = useMemo(() => {
          const map = new Map();
          filtered.forEach(t => {
            const m = dayjs(t.date).format('YYYY-MM');
            const prev = map.get(m) || { income: 0, expense: 0 };
            if (t.type === 'income') prev.income += Number(t.amount || 0);
            else prev.expense += Number(t.amount || 0);
            map.set(m, prev);
          });
          const labels = Array.from(map.keys()).sort();
          return {
            labels: labels.map(m => dayjs(m).format('MMM YYYY')),
            income: labels.map(l => map.get(l).income),
            expense: labels.map(l => map.get(l).expense),
          };
        }, [filtered]);

        const categoryData = useMemo(() => {
          const map = new Map();
          filtered.forEach(t => {
            const key = t.category || 'Uncategorized';
            const prev = map.get(key) || 0;
            const amt = Number(t.amount || 0) * (t.type === 'expense' ? 1 : -1);
            map.set(key, prev + amt);
          });
          const labels = Array.from(map.keys());
          const values = labels.map(l => Math.abs(map.get(l)));
          return { labels, values };
        }, [filtered]);

        useEffect(() => {
          const ctx = lineRef.current?.getContext('2d');
          if (!ctx) return;
          if (lineChart.current) lineChart.current.destroy();
          lineChart.current = new Chart(ctx, {
            type: 'line',
            data: {
              labels: monthlyData.labels,
              datasets: [
                { label: 'Income', data: monthlyData.income, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.2)' },
                { label: 'Expense', data: monthlyData.expense, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.2)' },
              ]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
          });
          return () => lineChart.current?.destroy();
        }, [monthlyData]);

        useEffect(() => {
          const ctx = doughnutRef.current?.getContext('2d');
          if (!ctx) return;
          if (doughnutChart.current) doughnutChart.current.destroy();
          doughnutChart.current = new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: categoryData.labels,
              datasets: [{
                label: 'By Category',
                data: categoryData.values,
                backgroundColor: ['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#14b8a6','#f97316','#84cc16','#06b6d4','#22c55e','#e11d48']
              }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
          });
          return () => doughnutChart.current?.destroy();
        }, [categoryData]);

        return (
          <div className="grid grid-2">
            <div className="card">
              <h3>Monthly Trend</h3>
              <canvas ref={lineRef} height="140"></canvas>
            </div>
            <div className="card">
              <h3>Category Breakdown</h3>
              <canvas ref={doughnutRef} height="140"></canvas>
            </div>
          </div>
        );
      }

      function ImportExport() {
        const { state, dispatch } = useBudget();
        const exportData = () => {
          const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `budget-export-${Date.now()}.json`;
          a.click();
          URL.revokeObjectURL(url);
        };
        const importData = async (e) => {
          const file = e.target.files?.[0];
          if (!file) return;
          try {
            const text = await file.text();
            const json = JSON.parse(text);
            if (!json.transactions || !json.categories) throw new Error('Invalid file format');
            if (confirm('Import will replace current data. Continue?')) {
              dispatch({ type: 'IMPORT', payload: json });
            }
          } catch (err) {
            alert('Failed to import: ' + err.message);
          } finally {
            e.target.value = '';
          }
        };
        const clearAll = () => { if (confirm('Clear all budget data? This cannot be undone.')) dispatch({ type: 'CLEAR' }); };
        return (
          <div className="card row" style={{ justifyContent: 'space-between' }}>
            <div className="row">
              <button className="btn-outline" onClick={exportData}>Export JSON</button>
              <input type="file" accept="application/json" onChange={importData} />
            </div>
            <button className="btn-danger" onClick={clearAll}>Clear All</button>
          </div>
        );
      }

      function App() {
        const { state } = useBudget();
        const [month, setMonth] = useState('');
        const [category, setCategory] = useState('');
        const filtered = useMemo(() => {
          return state.transactions
            .filter(t => (month ? dayjs(t.date).format('YYYY-MM') === month : true))
            .filter(t => (category ? t.category === category : true))
            .sort((a, b) => dayjs(b.date).valueOf() - dayjs(a.date).valueOf());
        }, [state.transactions, month, category]);

        // Register Service Worker after full page load
        window.addEventListener('load', () => {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
              .then(reg => console.log('SW registered', reg))
              .catch(err => console.error('SW registration failed', err));
          }
        });

        return (
          <div className="container">
            <Header />
            <div className="grid" style={{ marginTop: 16 }}>
              <ImportExport />
              <Filters month={month} setMonth={setMonth} category={category} setCategory={setCategory} />
              <Summary filtered={filtered} />
              <TransactionForm />
              <TransactionList filtered={filtered} />
              <Charts filtered={filtered} />
              <CategoryManager />
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(
        <React.StrictMode>
          <BudgetProvider>
            <App />
          </BudgetProvider>
        </React.StrictMode>
      );
    </script>
  </body>
</html>
